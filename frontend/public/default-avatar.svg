<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="person" x1="44" y1="30" x2="84" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Background circle with gradient -->
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>
  <!-- Subtle inner ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Head -->
  <circle cx="64" cy="46" r="18" fill="url(#person)" filter="url(#glow)"/>
  <!-- Shoulders / body -->
  <path d="M64 70c-20 0-36 10-36 24v6h72v-6c0-14-16-24-36-24z" fill="url(#person)" filter="url(#glow)"/>
  <!-- Sparkle accent top-right -->
  <circle cx="94" cy="26" r="3" fill="#fff" fill-opacity="0.5"/>
  <circle cx="98" cy="22" r="1.5" fill="#fff" fill-opacity="0.35"/>
</svg>
